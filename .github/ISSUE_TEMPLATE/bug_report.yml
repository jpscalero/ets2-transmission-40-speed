name: Bug Report / Reporte de Error
description: Create a report to help us improve the transmission mod / Crea un reporte para ayudarnos a mejorar.
labels: [bug, v1.58]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please provide as much detail as possible.
        ¡Gracias por reportar! Por favor, proporciona todos los detalles posibles.
  - type: input
    id: truck_model
    attributes:
      label: Truck Model / Modelo de Camión
      description: Which truck are you using? / ¿Qué camión usas?
      placeholder: e.g. Scania S 2016
    validations:
      required: true
  - type: dropdown
    id: version
    attributes:
      label: Game Version / Versión del Juego
      options:
        - v1.58.x
        - v1.57.x
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem Description / Descripción del Problema
      description: What happened? / ¿Qué ha pasado?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Game Log (game.log.txt)
      description: Please paste your game.log.txt here / Pega tu game.log.txt aquí.
      render: text
