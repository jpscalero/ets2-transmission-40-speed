name: Sugerencia de Mejora
description: Sugiere una idea para el proyecto Antigravity.
labels: [enhancement]
body:
  - type: textarea
    id: feature
    attributes:
      label: Descripción de la Mejora
      description: Describe la nueva lógica de transmisión o el soporte para camiones que te gustaría ver.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: ¿Por qué es necesario?
      description: Explica cómo esto mejora la experiencia de transporte pesado.
    validations:
      required: true
